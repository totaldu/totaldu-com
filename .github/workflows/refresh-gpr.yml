name: Refresh GPR & Simulate

# GPR 팀별 점수를 받아 시뮬레이션을 다시 돌리고, 변경 시 커밋한다.
# main 에 커밋되면 deploy.yml 이 자동으로 사이트를 재배포한다.
on:
  schedule:
    - cron: '0 0,3,6,9,12,15,18,21 * * *' # 3시간마다: 09:00·12:00·15:00·18:00·21:00·00:00·03:00·06:00 KST (00·03·06·09·12·15·18·21 UTC)
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Fetch league standings & brackets
        run: node scripts/fetchStandings.mjs

      - name: Fetch GPR scores & re-simulate
        run: node scripts/fetchGpr.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          node -e "const fs=require('fs'),f='client/src/data/lolSim.json',d=JSON.parse(fs.readFileSync(f,'utf8'));d.updatedAt=new Date().toISOString();fs.writeFileSync(f,JSON.stringify(d,null,2)+'\n');"
          git add client/src/data/gprTeams.json client/src/data/lolSim.json client/src/data/lolStandings.json
          git commit -m "chore: 순위표·GPR 자동 갱신 및 시뮬레이션 재계산" || echo "변경 없음 — 커밋 생략"
          # push 전 최신 커밋 통합 (동시 실행 시 충돌 방지)
          git pull --rebase origin main || (git rebase --abort && git pull --ff-only origin main)
          git push

      # open beta(totaldu.github.io)·prod(totaldu.com)는 예약 Actions가 불안정해 자체 갱신이
      # 멈추는 문제가 있어, 안정적으로 도는 close beta가 최신 상태를 두 저장소에 미러링한다.
      # MIRROR_PAT: totaldu 소유 두 저장소에 contents:write 권한이 있는 PAT (repo secret).
      - name: Mirror to open beta & prod
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
        run: |
          if [ -z "$MIRROR_PAT" ]; then
            echo "::warning::MIRROR_PAT 시크릿 미설정 — 미러링 생략"
            exit 0
          fi
          for repo in "totaldu/totaldu.github.io" "totaldu/totaldu-com"; do
            if git push --force "https://x-access-token:${MIRROR_PAT}@github.com/${repo}.git" HEAD:main; then
              echo "✓ 미러 완료: ${repo}"
            else
              echo "::warning::미러 실패: ${repo}"
            fi
          done
